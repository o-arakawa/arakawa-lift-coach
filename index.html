<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arakawa Lift Coach</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Arakawa Lift Coach</p>
        <h1>いつものメモでいい。</h1>
        <p>細かい入力はあと。まず貼る、残す、次が決まる。</p>
      </section>

      <section class="record-card" id="record">
        <div class="record-top">
          <label>
            日付
            <input id="logDate" type="date" />
          </label>
          <button id="yesterdayButton">昨日分</button>
          <button id="restButton">休養</button>
        </div>

        <textarea id="rawMemo" placeholder="例:
ベンチ60×8、60×8、65×5
ラットプル50×10、ローロウ60×12
肩ちょい痛い、昨日飲んだ"></textarea>

        <div class="quick-chips">
          <button data-add="ベンチ60×8、60×8、65×5">ベンチ</button>
          <button data-add="ラットプル50×10、50×10、42.5×12">背中</button>
          <button data-add="スクワット70×10、80×8、80×10">脚</button>
          <button data-add="肩ちょい痛い">肩痛</button>
          <button data-add="昨日飲んだ">飲酒</button>
          <button data-add="疲労強め">疲労</button>
        </div>

        <div class="memo-assist">
          <div>
            <strong>体のこと</strong>
            <button data-add="体重72.4kg">体重</button>
            <button data-add="体脂肪16.8%">体脂肪</button>
            <button data-add="睡眠6時間">睡眠</button>
            <button data-add="腰ちょい痛い">腰痛</button>
          </div>
          <div>
            <strong>目的</strong>
            <button data-add="今日は胸を伸ばしたい">胸を伸ばす</button>
            <button data-add="減量中">減量中</button>
            <button data-add="重量更新したい">重量更新</button>
            <button data-add="軽めで整える">整える</button>
          </div>
          <div>
            <strong>有酸素・生活</strong>
            <button data-add="ランニング15分">有酸素</button>
            <button data-add="歩数8000歩">歩数</button>
            <button data-add="たんぱく質多め">食事</button>
            <button data-add="ストレッチ10分">ケア</button>
          </div>
        </div>

        <button class="primary-button" id="saveMemo">このまま記録</button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="label">Coach hints</p>
            <h2>これも書ける</h2>
          </div>
        </div>
        <div class="hint-box" id="hintBox"></div>
      </section>

      <section class="result-grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <p class="label">Auto sort</p>
              <h2>自動整理</h2>
            </div>
          </div>
          <div class="parsed-box" id="parsedBox"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <p class="label">Next</p>
              <h2>次のメニュー</h2>
            </div>
          </div>
          <div class="plan-box" id="planBox"></div>
        </article>
      </section>

      <section class="result-grid">
        <article class="panel">
          <div class="panel-header">
            <div>
              <p class="label">Missed</p>
              <h2>書き忘れ</h2>
            </div>
          </div>
          <div class="missed-list" id="missedList"></div>
        </article>

        <article class="panel">
          <div class="panel-header">
            <div>
              <p class="label">History</p>
              <h2>最近のメモ</h2>
            </div>
            <button class="text-button" id="clearLogs">追加分を消す</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </article>
      </section>
    </main>

    <nav class="bottom-nav">
      <a href="#record">記録</a>
      <a href="#planBox">提案</a>
      <a href="#historyList">履歴</a>
    </nav>

    <script src="app.js"></script>
  </body>
</html>
